<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
  <header>
    <a class="site-title" href="{{ '/' | relative_url }}">{{ site.title }}</a>

    <nav>
      <a href="{{ '/' | relative_url }}">Home</a>
      <a href="{{ '/notes/' | relative_url }}">Notes</a>
      <a href="mailto:logicdesignlabs@gmail.com">Email</a>
    </nav>
  </header>

  <main>
    {{ content }}
  </main>

  <footer>
    <span>© {{ site.time | date: "%Y" }} Logic Design Consulting di Carrozzo Michelangelo</span>
    {% if site.github.repository_url %}
      <span><a href="{{ site.github.repository_url }}">GitHub</a></span>
    {% endif %}
  </footer>
</body>
</html>
